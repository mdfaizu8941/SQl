version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sql_admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: sql_studio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
